<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Page non trouvée</title>
    <script type="text/javascript">
        // Redirection pour GitHub Pages avec sous-dossier
        var segmentsToKeep = 1; // Pour /my-site/

        var l = window.location;
        var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') +
            '/?p=/' +
            l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash;

        l.replace(redirect);
    </script>
</head>

<body>
    <p>Redirection en cours...</p>
</body>

</html>
